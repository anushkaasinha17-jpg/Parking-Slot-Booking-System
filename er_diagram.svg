<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="900" height="560" fill="#0b0f1a"/>
  <text x="450" y="38" text-anchor="middle" fill="#f5c842" font-size="18" font-weight="700">Entity-Relationship Diagram – ParkEase</text>

  <!-- Helper: Entity box macro via rects -->
  <!-- USER entity -->
  <rect x="30" y="80" width="160" height="200" rx="10" fill="#131929" stroke="#3b82f6" stroke-width="2"/>
  <rect x="30" y="80" width="160" height="36" rx="10" fill="#3b82f6"/>
  <text x="110" y="104" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">USER</text>
  <line x1="30" y1="116" x2="190" y2="116" stroke="#3b82f6"/>
  <text x="50" y="138" fill="#7a8fad" font-size="11">🔑 user_id (PK)</text>
  <text x="50" y="156" fill="#e8edf5" font-size="11">  name</text>
  <text x="50" y="174" fill="#e8edf5" font-size="11">  campus_id</text>
  <text x="50" y="192" fill="#e8edf5" font-size="11">  email</text>
  <text x="50" y="210" fill="#e8edf5" font-size="11">  role (student/faculty)</text>
  <text x="50" y="228" fill="#e8edf5" font-size="11">  phone</text>
  <text x="50" y="246" fill="#e8edf5" font-size="11">  vehicle_number</text>
  <text x="50" y="264" fill="#e8edf5" font-size="11">  created_at</text>

  <!-- BOOKING entity -->
  <rect x="360" y="60" width="180" height="230" rx="10" fill="#131929" stroke="#f5c842" stroke-width="2"/>
  <rect x="360" y="60" width="180" height="36" rx="10" fill="#f5c842"/>
  <text x="450" y="84" text-anchor="middle" fill="#0b0f1a" font-size="13" font-weight="700">BOOKING</text>
  <line x1="360" y1="96" x2="540" y2="96" stroke="#f5c842"/>
  <text x="378" y="118" fill="#7a8fad" font-size="11">🔑 booking_id (PK)</text>
  <text x="378" y="136" fill="#e8edf5" font-size="11">  user_id (FK)</text>
  <text x="378" y="154" fill="#e8edf5" font-size="11">  slot_id (FK)</text>
  <text x="378" y="172" fill="#e8edf5" font-size="11">  booking_date</text>
  <text x="378" y="190" fill="#e8edf5" font-size="11">  arrival_time</text>
  <text x="378" y="208" fill="#e8edf5" font-size="11">  departure_time</text>
  <text x="378" y="226" fill="#e8edf5" font-size="11">  qr_code</text>
  <text x="378" y="244" fill="#e8edf5" font-size="11">  status</text>
  <text x="378" y="262" fill="#e8edf5" font-size="11">  created_at</text>

  <!-- SLOT entity -->
  <rect x="700" y="80" width="170" height="200" rx="10" fill="#131929" stroke="#22c55e" stroke-width="2"/>
  <rect x="700" y="80" width="170" height="36" rx="10" fill="#22c55e"/>
  <text x="785" y="104" text-anchor="middle" fill="#0b0f1a" font-size="13" font-weight="700">PARKING SLOT</text>
  <line x1="700" y1="116" x2="870" y2="116" stroke="#22c55e"/>
  <text x="718" y="138" fill="#7a8fad" font-size="11">🔑 slot_id (PK)</text>
  <text x="718" y="156" fill="#e8edf5" font-size="11">  zone_id (FK)</text>
  <text x="718" y="174" fill="#e8edf5" font-size="11">  slot_number</text>
  <text x="718" y="192" fill="#e8edf5" font-size="11">  slot_type</text>
  <text x="718" y="210" fill="#e8edf5" font-size="11">  status</text>
  <text x="718" y="228" fill="#e8edf5" font-size="11">  floor_level</text>
  <text x="718" y="246" fill="#e8edf5" font-size="11">  is_reserved</text>
  <text x="718" y="264" fill="#e8edf5" font-size="11">  updated_at</text>

  <!-- ZONE entity -->
  <rect x="680" y="370" width="170" height="150" rx="10" fill="#131929" stroke="#f97316" stroke-width="2"/>
  <rect x="680" y="370" width="170" height="36" rx="10" fill="#f97316"/>
  <text x="765" y="394" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">ZONE</text>
  <line x1="680" y1="406" x2="850" y2="406" stroke="#f97316"/>
  <text x="698" y="428" fill="#7a8fad" font-size="11">🔑 zone_id (PK)</text>
  <text x="698" y="446" fill="#e8edf5" font-size="11">  zone_name</text>
  <text x="698" y="464" fill="#e8edf5" font-size="11">  total_slots</text>
  <text x="698" y="482" fill="#e8edf5" font-size="11">  available_slots</text>
  <text x="698" y="500" fill="#e8edf5" font-size="11">  location_desc</text>

  <!-- NOTIFICATION entity -->
  <rect x="30" y="360" width="160" height="160" rx="10" fill="#131929" stroke="#a855f7" stroke-width="2"/>
  <rect x="30" y="360" width="160" height="36" rx="10" fill="#a855f7"/>
  <text x="110" y="384" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">NOTIFICATION</text>
  <line x1="30" y1="396" x2="190" y2="396" stroke="#a855f7"/>
  <text x="50" y="418" fill="#7a8fad" font-size="11">🔑 notif_id (PK)</text>
  <text x="50" y="436" fill="#e8edf5" font-size="11">  booking_id (FK)</text>
  <text x="50" y="454" fill="#e8edf5" font-size="11">  type</text>
  <text x="50" y="472" fill="#e8edf5" font-size="11">  message</text>
  <text x="50" y="490" fill="#e8edf5" font-size="11">  sent_at</text>
  <text x="50" y="508" fill="#e8edf5" font-size="11">  is_read</text>

  <!-- Relationship lines -->
  <!-- USER → BOOKING (1 to many) -->
  <line x1="190" y1="170" x2="360" y2="170" stroke="#f5c842" stroke-width="1.5" stroke-dasharray="5"/>
  <text x="275" y="160" text-anchor="middle" fill="#f5c842" font-size="11">makes (1:N)</text>

  <!-- BOOKING → SLOT (many to 1) -->
  <line x1="540" y1="170" x2="700" y2="170" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5"/>
  <text x="620" y="160" text-anchor="middle" fill="#22c55e" font-size="11">has (N:1)</text>

  <!-- SLOT → ZONE (many to 1) -->
  <line x1="785" y1="280" x2="785" y2="370" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5"/>
  <text x="800" y="330" fill="#f97316" font-size="11">belongs (N:1)</text>

  <!-- BOOKING → NOTIFICATION (1 to many) -->
  <line x1="450" y1="290" x2="190" y2="430" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="5"/>
  <text x="300" y="380" text-anchor="middle" fill="#a855f7" font-size="11">triggers (1:N)</text>
</svg>
