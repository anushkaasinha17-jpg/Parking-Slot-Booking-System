<svg viewBox="0 0 860 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="860" height="480" fill="#0b0f1a"/>
  <text x="430" y="38" text-anchor="middle" fill="#f5c842" font-size="18" font-weight="700">DFD Level 0 – Context Diagram</text>

  <!-- Central Process -->
  <circle cx="430" cy="240" r="110" fill="#131929" stroke="#f5c842" stroke-width="2.5"/>
  <text x="430" y="232" text-anchor="middle" fill="#f5c842" font-size="15" font-weight="700">ParkEase</text>
  <text x="430" y="252" text-anchor="middle" fill="#7a8fad" font-size="12">Parking Booking</text>
  <text x="430" y="268" text-anchor="middle" fill="#7a8fad" font-size="12">System</text>

  <!-- External Entities -->
  <!-- Student/Faculty -->
  <rect x="20" y="180" width="150" height="50" rx="8" fill="#1a2236" stroke="#3b82f6" stroke-width="2"/>
  <text x="95" y="209" text-anchor="middle" fill="#3b82f6" font-size="13" font-weight="600">Student / Faculty</text>

  <!-- Admin -->
  <rect x="690" y="180" width="150" height="50" rx="8" fill="#1a2236" stroke="#f97316" stroke-width="2"/>
  <text x="765" y="209" text-anchor="middle" fill="#f97316" font-size="13" font-weight="600">Admin</text>

  <!-- Gate System -->
  <rect x="200" y="380" width="160" height="50" rx="8" fill="#1a2236" stroke="#22c55e" stroke-width="2"/>
  <text x="280" y="409" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="600">Gate / Barrier</text>

  <!-- Notification Service -->
  <rect x="480" y="380" width="160" height="50" rx="8" fill="#1a2236" stroke="#a855f7" stroke-width="2"/>
  <text x="560" y="409" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="600">Email / SMS Service</text>

  <!-- Arrows: Student → System -->
  <line x1="170" y1="200" x2="322" y2="225" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="215" y="198" fill="#e8edf5" font-size="10">Login credentials</text>
  <text x="218" y="210" fill="#e8edf5" font-size="10">Booking request</text>

  <!-- System → Student -->
  <line x1="322" y1="250" x2="170" y2="225" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="200" y="250" fill="#e8edf5" font-size="10">Booking confirmation</text>
  <text x="210" y="262" fill="#e8edf5" font-size="10">QR Code</text>

  <!-- Admin → System -->
  <line x1="690" y1="200" x2="538" y2="225" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="583" y="196" fill="#e8edf5" font-size="10">Slot config, overrides</text>

  <!-- System → Admin -->
  <line x1="538" y1="250" x2="690" y2="225" stroke="#f97316" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="576" y="258" fill="#e8edf5" font-size="10">Reports, analytics</text>

  <!-- Gate → System -->
  <line x1="355" y1="380" x2="390" y2="348" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="330" y="362" fill="#e8edf5" font-size="10">QR scan result</text>

  <!-- System → Gate -->
  <line x1="385" y1="348" x2="340" y2="380" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="326" y="344" fill="#e8edf5" font-size="10">Gate open/deny</text>

  <!-- System → Email -->
  <line x1="470" y1="345" x2="490" y2="380" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="460" y="370" fill="#e8edf5" font-size="10">Alert triggers</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7a8fad"/>
    </marker>
  </defs>
</svg>
