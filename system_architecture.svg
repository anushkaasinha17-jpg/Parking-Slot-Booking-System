<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="900" height="520" fill="#0b0f1a"/>
  <text x="450" y="36" text-anchor="middle" fill="#f5c842" font-size="18" font-weight="700">System Architecture – ParkEase</text>

  <!-- Layer labels -->
  <text x="18" y="110" fill="#7a8fad" font-size="10" transform="rotate(-90,18,110)">CLIENT</text>
  <text x="18" y="230" fill="#7a8fad" font-size="10" transform="rotate(-90,18,230)">API</text>
  <text x="18" y="360" fill="#7a8fad" font-size="10" transform="rotate(-90,18,360)">DATA</text>
  <text x="18" y="470" fill="#7a8fad" font-size="10" transform="rotate(-90,18,470)">INFRA</text>

  <!-- Layer bands -->
  <rect x="40" y="60" width="840" height="80" rx="10" fill="rgba(59,130,246,0.06)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
  <rect x="40" y="160" width="840" height="80" rx="10" fill="rgba(245,200,66,0.05)" stroke="rgba(245,200,66,0.2)" stroke-width="1"/>
  <rect x="40" y="260" width="840" height="100" rx="10" fill="rgba(34,197,94,0.05)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <rect x="40" y="380" width="840" height="110" rx="10" fill="rgba(249,115,22,0.05)" stroke="rgba(249,115,22,0.2)" stroke-width="1"/>

  <!-- Layer titles -->
  <text x="60" y="78" fill="#3b82f6" font-size="11" font-weight="700">PRESENTATION LAYER</text>
  <text x="60" y="178" fill="#f5c842" font-size="11" font-weight="700">APPLICATION LAYER (REST API)</text>
  <text x="60" y="278" fill="#22c55e" font-size="11" font-weight="700">DATA LAYER</text>
  <text x="60" y="398" fill="#f97316" font-size="11" font-weight="700">INFRASTRUCTURE / SERVICES</text>

  <!-- Presentation -->
  <rect x="130" y="86" width="130" height="42" rx="8" fill="#1a2236" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="195" y="111" text-anchor="middle" fill="#e8edf5" font-size="12">Web App (HTML/JS)</text>
  <rect x="290" y="86" width="130" height="42" rx="8" fill="#1a2236" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="355" y="111" text-anchor="middle" fill="#e8edf5" font-size="12">Mobile App</text>
  <rect x="450" y="86" width="130" height="42" rx="8" fill="#1a2236" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="515" y="111" text-anchor="middle" fill="#e8edf5" font-size="12">Admin Dashboard</text>
  <rect x="610" y="86" width="130" height="42" rx="8" fill="#1a2236" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="675" y="111" text-anchor="middle" fill="#e8edf5" font-size="12">Gate QR Scanner</text>

  <!-- API Layer -->
  <rect x="100" y="186" width="140" height="38" rx="8" fill="#1a2236" stroke="#f5c842" stroke-width="1.5"/>
  <text x="170" y="209" text-anchor="middle" fill="#e8edf5" font-size="11">Auth Service (JWT)</text>
  <rect x="265" y="186" width="140" height="38" rx="8" fill="#1a2236" stroke="#f5c842" stroke-width="1.5"/>
  <text x="335" y="209" text-anchor="middle" fill="#e8edf5" font-size="11">Booking Service</text>
  <rect x="430" y="186" width="140" height="38" rx="8" fill="#1a2236" stroke="#f5c842" stroke-width="1.5"/>
  <text x="500" y="209" text-anchor="middle" fill="#e8edf5" font-size="11">Slot Management</text>
  <rect x="595" y="186" width="140" height="38" rx="8" fill="#1a2236" stroke="#f5c842" stroke-width="1.5"/>
  <text x="665" y="209" text-anchor="middle" fill="#e8edf5" font-size="11">Notification Service</text>
  <rect x="760" y="186" width="100" height="38" rx="8" fill="#1a2236" stroke="#f5c842" stroke-width="1.5"/>
  <text x="810" y="209" text-anchor="middle" fill="#e8edf5" font-size="11">Analytics API</text>

  <!-- Data Layer -->
  <rect x="120" y="288" width="140" height="50" rx="8" fill="#1a2236" stroke="#22c55e" stroke-width="1.5"/>
  <text x="190" y="308" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="600">MySQL DB</text>
  <text x="190" y="325" text-anchor="middle" fill="#7a8fad" font-size="10">Users, Bookings, Slots</text>
  <rect x="350" y="288" width="140" height="50" rx="8" fill="#1a2236" stroke="#22c55e" stroke-width="1.5"/>
  <text x="420" y="308" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="600">Redis Cache</text>
  <text x="420" y="325" text-anchor="middle" fill="#7a8fad" font-size="10">Live Slot Status</text>
  <rect x="580" y="288" width="140" height="50" rx="8" fill="#1a2236" stroke="#22c55e" stroke-width="1.5"/>
  <text x="650" y="308" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="600">File Storage</text>
  <text x="650" y="325" text-anchor="middle" fill="#7a8fad" font-size="10">QR Codes / Logs</text>

  <!-- Infrastructure -->
  <rect x="80" y="408" width="120" height="50" rx="8" fill="#1a2236" stroke="#f97316" stroke-width="1.5"/>
  <text x="140" y="428" text-anchor="middle" fill="#f97316" font-size="11" font-weight="600">AWS EC2</text>
  <text x="140" y="444" text-anchor="middle" fill="#7a8fad" font-size="10">App Server</text>
  <rect x="230" y="408" width="120" height="50" rx="8" fill="#1a2236" stroke="#f97316" stroke-width="1.5"/>
  <text x="290" y="428" text-anchor="middle" fill="#f97316" font-size="11" font-weight="600">Firebase</text>
  <text x="290" y="444" text-anchor="middle" fill="#7a8fad" font-size="10">Push Notifications</text>
  <rect x="380" y="408" width="120" height="50" rx="8" fill="#1a2236" stroke="#f97316" stroke-width="1.5"/>
  <text x="440" y="428" text-anchor="middle" fill="#f97316" font-size="11" font-weight="600">Twilio / SMTP</text>
  <text x="440" y="444" text-anchor="middle" fill="#7a8fad" font-size="10">Email / SMS</text>
  <rect x="530" y="408" width="120" height="50" rx="8" fill="#1a2236" stroke="#f97316" stroke-width="1.5"/>
  <text x="590" y="428" text-anchor="middle" fill="#f97316" font-size="11" font-weight="600">IoT Sensors</text>
  <text x="590" y="444" text-anchor="middle" fill="#7a8fad" font-size="10">Slot Occupancy</text>
  <rect x="680" y="408" width="160" height="50" rx="8" fill="#1a2236" stroke="#f97316" stroke-width="1.5"/>
  <text x="760" y="428" text-anchor="middle" fill="#f97316" font-size="11" font-weight="600">GitHub Actions CI/CD</text>
  <text x="760" y="444" text-anchor="middle" fill="#7a8fad" font-size="10">Auto Deploy Pipeline</text>

  <!-- Vertical connection lines -->
  <line x1="450" y1="130" x2="450" y2="160" stroke="#7a8fad" stroke-width="1" stroke-dasharray="4"/>
  <line x1="450" y1="224" x2="450" y2="260" stroke="#7a8fad" stroke-width="1" stroke-dasharray="4"/>
  <line x1="450" y1="360" x2="450" y2="380" stroke="#7a8fad" stroke-width="1" stroke-dasharray="4"/>
</svg>
